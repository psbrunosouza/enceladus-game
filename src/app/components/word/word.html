<button
  (click)="handleSelect()"
  [ngClass]="{
    'bg-gray-200 border-gray-400 pointer-events-none': locked(),
  }"
  class="px-4 py-2 border min-h-14.5 min-w-14.5 border-amber-400 hover:bg-amber-200 cursor-pointer transition-all font-bold text-4xl"
>
  <p [hidden]="hidden()">{{ word() }}</p>
</button>
